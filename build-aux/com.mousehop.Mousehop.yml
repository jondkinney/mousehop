# yaml-language-server: $schema=https://raw.githubusercontent.com/flatpak/flatpak-builder/refs/heads/main/data/flatpak-manifest.schema.json
app-id: com.mousehop.Mousehop
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: /app/bin/mousehop
build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin"
  prepend-ld-library-path: "/usr/lib/sdk/llvm20/lib"
  build-args:
    - "--share=network"
  env:
    # Sparse registry shaves multiple minutes off the cold dep
    # fetch — see https://blog.rust-lang.org/inside-rust/2023/01/30/cargo-sparse-protocol.html
    "CARGO_REGISTRIES_CRATES_IO_PROTOCOL": "sparse"
    "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER": "clang"
    # `-Wl,-z,now` forces immediate symbol resolution at load so
    # full-RELRO actually applies; combined with mold for link speed.
    "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS": "-C link-arg=-fuse-ld=/usr/lib/sdk/rust-stable/bin/mold -C link-arg=-Wl,-z,now"
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER": "clang"
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS": "-C link-arg=-fuse-ld=/usr/lib/sdk/rust-stable/bin/mold -C link-arg=-Wl,-z,now"

finish-args:
  - "--socket=wayland"
  - "--socket=fallback-x11"
  - "--device=dri"
  - "--socket=session-bus"
  - "--share=network"
  # mousehop relays UDP traffic; --share=ipc is required alongside
  # fallback-x11 (XSHM uses the shared IPC namespace).
  - "--share=ipc"
  # Per-app scope so a sandbox escape can't read every other app's
  # config; mousehop's config dir is `$XDG_CONFIG_HOME/mousehop/`
  # (see mousehop-app/src/config.rs).
  - "--filesystem=xdg-config/mousehop:rw"
  # Software KVM relays clipboard across peers — needs the
  # Clipboard portal to read/write the host's selection.
  - "--talk-name=org.freedesktop.portal.Clipboard"
  # Connection / disconnection toasts use the Notifications
  # portal; without this, peer-status notifications are silently
  # swallowed by the sandbox.
  - "--talk-name=org.freedesktop.Notifications"
  - "--env=RUST_BACKTRACE=1"
  - "--env=RUST_LOG=mousehop=debug"
  - "--env=GTK_PATH=/app/lib/gtk-4.0"

modules:
  - name: mousehop
    buildsystem: simple
    build-options:
      build-args:
        - "--share=network"
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
      env:
        CARGO_HOME: /run/build/mousehop/cargo
    build-commands:
      - cargo fetch --manifest-path Cargo.toml --verbose
      - cargo build --release
      - install -Dm0755 target/release/mousehop /app/bin/mousehop
      - install -Dm0644 mousehop-gtk/resources/com.mousehop.Mousehop.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 mousehop-app/com.mousehop.Mousehop.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      # AppStream metainfo — required by Flathub, also picked up by
      # GNOME Software / KDE Discover for sideloaded bundles.
      - install -Dm0644 build-aux/com.mousehop.Mousehop.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
    sources:
      - type: dir
        path: ..
