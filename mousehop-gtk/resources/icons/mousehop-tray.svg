<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="173 157.5 692 692" width="692" height="692">
  <!--
    Tray / menu-bar glyph for mousehop: the cursor + hop-trail mark from
    com.mousehop.Mousehop.svg with the indigo tile removed, so the tray /
    menu-bar icon matches the Dock icon. The paths are copied verbatim
    from the app icon (same 1024 coordinate space); the viewBox just
    frames that mark to sit at ~78% of the icon slot with menu-bar
    padding, so it reads at the same optical size as neighbouring system
    icons. fill / stroke are `currentColor`: linux_tray.rs substitutes
    white before rasterizing to ARGB pixmaps for the StatusNotifierItem
    host; scripts/makeicns.sh flattens it to a black+alpha menu-bar
    template (the magick step zeroes RGB anyway, so the color="black"
    fallback below is just belt-and-suspenders).

    The app icon separates the cursor from the trail with an indigo
    keyline (a stroke the colour of the tile). With no tile here, that
    keyline is reproduced as a *transparent* moat via the mask below: it
    cuts the cursor's outline (plus a small ring) out of the trail so the
    two don't merge into a blob at 16-22 px, and the gap survives any
    tint. Keep this docstring inside <svg> — GdkPixbuf's SVG sniffer
    reads only the first ~256 bytes looking for the <svg tag.
  -->
  <defs>
    <mask id="cursor-keyline" maskUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <rect width="1024" height="1024" fill="white"/>
      <g transform="translate(536,250) scale(2.85)">
        <path d="M0 0 L0 104 L27 80 L45 122 L66 113 L48 72 L84 72 Z"
              fill="black" stroke="black" stroke-width="10" stroke-linejoin="round"/>
      </g>
    </mask>
  </defs>
  <g color="black" fill="currentColor">
    <path d="M278 742 Q322 356 604 381" fill="none" stroke="currentColor"
          stroke-width="58" stroke-linecap="round" mask="url(#cursor-keyline)"/>
    <g transform="translate(536,250) scale(2.85)">
      <path d="M0 0 L0 104 L27 80 L45 122 L66 113 L48 72 L84 72 Z"/>
    </g>
  </g>
</svg>
