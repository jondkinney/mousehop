<?xml version="1.0" encoding="UTF-8"?>
<!--
  mousehop app icon — a cursor at the head of a "hop" trail on a rounded
  indigo tile. Self-contained: the SVG carries its own background and rounded
  corners (rx 230 of 1024 ≈ 22.5%, the macOS Big Sur squircle proportion), so
  it works as-is as a Linux app icon and scripts/makeicns.sh renders it
  straight into the macOS squircle. The bolder, tile-less small-size mark is
  the separate resources/icons/mousehop-tray.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" rx="230" fill="#4F46E5"/>
  <!-- hop trail -->
  <path d="M278 742 Q322 356 604 381" fill="none" stroke="#ffffff"
        stroke-width="58" stroke-linecap="round"/>
  <!-- cursor; the indigo keyline holds it apart where it crosses the trail -->
  <g transform="translate(536,250) scale(2.85)">
    <path d="M0 0 L0 104 L27 80 L45 122 L66 113 L48 72 L84 72 Z"
          fill="#ffffff" stroke="#4F46E5" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
