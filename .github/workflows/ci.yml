name: CI

# Per-PR safety net: fmt + clippy + test on every OS we ship to.
# Release-time builds live in release.yml; this is the pre-merge gate
# that keeps main green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-15-intel
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install libx11-dev libxtst-dev libadwaita-1-dev libgtk-4-dev libdbus-1-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install gtk4 libadwaita imagemagick

      # Windows GTK stack lives in C:\gtk-build, populated by gvsbuild
      # and cached so we only pay the build cost on cold cache.
      - name: Windows - create gtk dir
        if: runner.os == 'Windows'
        run: mkdir C:\gtk-build\gtk\x64\release
      - name: Windows - cache gtk
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: cache
        with:
          path: c:/gtk-build/gtk/x64/release/**
          key: gtk-windows-build
          restore-keys: gtk-windows-build
      - name: Windows - update PATH
        if: runner.os == 'Windows'
        run: |
          echo "PKG_CONFIG=C:\gtk-build\gtk\x64\release\bin\pkgconf.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\pkg-config-lite-0.28-1\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\gtk-build\gtk\x64\release\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Windows - build gtk on cache miss
        if: runner.os == 'Windows' && steps.cache.outputs.cache-hit != 'true'
        run: |
          py -m venv .venv
          .venv\Scripts\activate.ps1
          py -m pip install gvsbuild
          gvsbuild build --msys-dir=C:\msys64 gtk4 libadwaita librsvg

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features
